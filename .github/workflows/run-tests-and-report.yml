name: Run Automation Tests and Generate Report

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium

      - name: Run tests and generate HTML report
        run: |
          pytest --html=artifacts/report.html --self-contained-html
        continue-on-error: true

      - name: Create index.html redirect
        if: always()
        run: |
          cat > artifacts/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <title>Ezra Test Report</title>
              <meta http-equiv="refresh" content="0;url=report.html">
              <script>
                window.location.href = 'report.html';
              </script>
            </head>
            <body>
              <p>Redirecting to <a href="report.html">test report</a>...</p>
            </body>
          </html>
          EOF

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: artifacts/report.html
          retention-days: 30

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./artifacts
